name: office
version: 1.0.0
description: 常用办公插件
author: AdeBuddy
license: MIT
keywords: [office, document, browser, automation]
categories: [office, browser]
scripts:
  install: npm i -g open-computer-use && npm i -g open-browser-use && open-browser-use setup
mcpServers:
  open-computer-use:
    command: open-computer-use
    args:
      - mcp
  open-browser-use:
    command: obu
    args:
      - 'mcp'
    name: open_browser_use
    disabled: false
skills:
  - name: find-skills
    source: vercel-labs/skills
    skill: find-skills
    description: 查找技能
  - name: skill-creator
    source: anthropics/skills
    skill: skill-creator
    description: 创建技能
  - name: open-browser-use
    source: iFurySt/open-browser-use
    description: 浏览器自动化操作
  - name: open-computer-use
    source: iFurySt/open-codex-computer-use
    skill: open-computer-use
    description: 电脑自动化操作
  - name: screenshot
    source: openai/skills
    skill: screenshot
    description: 截图
  - name: playwright-master
    source: modelscope.cn@playwright-master
    description: Playwright 浏览器自动化
  # ===== 文档处理 =====
  - name: docx
    source: anthropics/skills
    skill: docx
    description: Word 文档操作 - 创建、编辑、格式化 .docx 文件
  - name: xlsx
    source: anthropics/skills
    skill: xlsx
    description: Excel 表格操作 - 创建、编辑、公式计算 .xlsx 文件
  - name: pdf
    source: anthropics/skills
    skill: pdf
    description: PDF 文档操作 - 创建、解析、转换 PDF 文件
  - name: pptx
    source: anthropics/skills
    skill: pptx
    description: PowerPoint 演示文稿操作
  # ===== 办公自动化 =====
  - name: doc-coauthoring
    source: anthropics/skills
    skill: doc-coauthoring
    description: 文档协作 - 分阶段协作流程组织与完善文档内容
