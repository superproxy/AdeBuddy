name: dev-tools
version: 1.0.0
description: 开发工具插件 - 提供 RESTful API 设计、测试、代码审查等能力
author: AgentBuddy
mcpServers:
  context7:
    type: http
    url: https://mcp.context7.com/mcp
    headers:
      CONTEXT7_API_KEY: ''
    disabled: false
  filesystem:
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-filesystem'
      - ./
    env: {}
    disabled: false
  openaiDeveloperDocs:
    url: https://developers.openai.com/mcp
    disabled: true
skills:
  - { name: restful-api-design-skill, source: restful-api-design-skill, description: RESTful API 设计与接口契约 }
  - { name: systematic-debugging, source: obra/superpowers@systematic-debugging, description: 系统化调试方法论 }
  - { name: test-driven-development, source: obra/superpowers@test-driven-development, description: 测试驱动开发 }
  - { name: receiving-code-review, source: obra/superpowers@receiving-code-review, description: 接收代码审查反馈 }
  - { name: requesting-code-review, source: obra/superpowers@requesting-code-review, description: 请求代码审查 }
  - { name: verification-before-completion, source: obra/superpowers@verification-before-completion, description: 完成前验证 }
  - { name: playwright-master, source: playwright-master, description: Playwright 浏览器自动化 }
  - { name: pptx, source: anthropics/skills@pptx, description: PowerPoint 文件操作 }
  - { name: screenshot, source: screenshot, description: 截图能力 }
